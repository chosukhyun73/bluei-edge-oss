    current_density_range: medium
    roi:
      feeding_zone: null
      exclude_zones: []
    calibration:
      surface_direction: top
      depth_axis: y
      visibility_baseline: null
    label_policy:
      feeding_response_scale: "0_to_5"
      collect_during_feeding: true

  - tank_id: tank_03
    camera_id: cam_tank_03_side
    applied_vision_algorithm_id: vision_atlantic_salmon_growout_circular_side_v1
    current_growth_stage: growout
    current_avg_weight_g: 636
    current_density_range: medium
    roi:
      feeding_zone: null
      exclude_zones: []
    calibration:
      surface_direction: top
