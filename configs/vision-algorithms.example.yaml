dataset_workflow:
  capture_policy:
    continuous_raw_video: false
    normal_sample_fps: 1
    feeding_clip_window_sec:
      before: 10
      after: 120
    anomaly_clip_window_sec:
      before: 10
      after: 30
    retention_days:
      snapshots: 30
      event_clips: 90
      training_samples: 365
  conversion:
    frame_sample_fps: 5
    roi_crop_enabled: true
    feature_series_enabled: true
    align_with_feeding_events: true
    align_with_water_quality_buckets: true
  labeling:
    enabled: true
    feeding_response_scale: "0_to_5"
    labels:
      - feeding_response_score
      - activity_level
      - visibility_quality
      - leftover_feed_candidate
      - abnormal_behavior_candidate
  training:
    enabled: false
    mode: supervised_calibration
    min_labeled_events: 30
    output_status: candidate
  validation_gate:
    min_labeled_events: 30
    min_label_correlation: 0.6
    max_false_stop_candidate_rate: 0.15
    min_visibility_valid_rate: 0.8
    max_inference_latency_ms: 200
