site:
  site_id: site_dev_001
  name: Bluei Dev Site
  timezone: Asia/Seoul
  # 아래는 페어링 QR(/v1/pair)이 앱에 전달 → 어장 자동구성에 사용:
  site_type: land_based_ras   # land_based_ras|hatchery|flow_through|pond|tank
  operator: ""                # 사업자/운영자명
  lat: 0.0                    # 위도(선택)
  lng: 0.0                    # 경도(선택)

edge:
  edge_id: edge_dev_001
  mode: development
  data_dir: ./var/bluei-edge

runtime:
  startup_timeout_sec: 30
  shutdown_timeout_sec: 10
  clock_skew_warning_sec: 300

api:
  bind_host: 0.0.0.0
  port: 8080
  request_timeout_sec: 30
  auth:
    enabled: true
    operator_token_env: BLUEI_EDGE_OPERATOR_TOKEN

storage:
  driver: sqlite
  sqlite_path: ./var/bluei-edge/edge.db
  migration_mode: auto

# 고용량 telemetry 보관기간. 만료 이벤트는 월별 백업 파일
# (archive/events-YYYY-MM.jsonl.gz)로 export 된 뒤 live DB 에서 제거된다.
# 백업 파일은 자동 삭제하지 않는다 — 저장/삭제는 운영자가 직접 관리한다.
# rules 에 없는 event_type(운영·감사)은 무기한 보존된다.
retention:
  enabled: true
  interval_sec: 86400        # 하루 1회 점검
  initial_delay_sec: 120
  archive_dir: ""            # 빈 값이면 sqlite 경로 디렉터리/archive 사용
  rules:
    # 센서 측정값: 최근 24~48h raw 보존(차트용), 그 이전은 일별 min/max/avg 요약만 남기고 raw 삭제.
    - event_type: sensor.reading.recorded
      keep_days: 1
      aggregate_daily: true
    # 장비 헬스: 24시간 지나면 삭제 (요약 없음).
    - event_type: device.health.updated
      keep_days: 1

